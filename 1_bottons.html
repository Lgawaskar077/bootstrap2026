<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>template only</title>
    
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-12">
          <button type="button" class="btn btn-danger">danger</button>
          <button type="button" class="btn btn-warning">warning</button>
          <button type="button" class="btn btn-dark">dark</button>
          <button type="button" class="btn btn-info">info</button>
          <button type="button" class="btn btn-success">success</button>
          <button type="button" class="btn btn-primary">primary</button>
          <button type="button" class="btn btn-secondary">secondary</button>
          <button type="button" class="btn btn-white">white</button>

        </div>
        </div>

        <div class="row mt-3 ms-5 me-5 mb-3">
            <div class="col-12">
                <button type="button" class="btn btn-lg btn-danger">danger</button>
                <button type="button" class="btn btn-lg btn-danger">warning</button>
                <button type="button" class="btn btn-lg btn-danger">info</button>
                <button type="button" class="btn btn-lg btn-danger">success</button>
                <button type="button" class="btn btn-lg btn-danger">primary</button>
                <button type="button" class="btn btn-lg btn-danger">secondary</button>
                <button type="button" class="btn btn-lg btn-danger">dark</button>
                <button type="button" class="btn btn-lg btn-danger">white</button>

            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <button type="button" class="btn btn-ms btn-danger">danger</button>
                <button type="button" class="btn btn-ms btn-danger">warning</button>
                <button type="button" class="btn btn-ms btn-danger">info</button>
                <button type="button" class="btn btn-ms btn-danger">success</button>
                <button type="button" class="btn btn-ms btn-danger">primary</button>
                <button type="button" class="btn btn-ms btn-danger">secondary</button>
                <button type="button" class="btn btn-ms btn-danger">dark</button>
                <button type="button" class="btn btn-ms btn-danger">white</button>
            </div>
        </div>
    </div>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
